<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Симулятор Авито: почему у конкурента больше звонков</title>
<style>
body{font-family:Arial,sans-serif;background:#f2f4f7;padding:20px;color:#222}
.container{max-width:900px;margin:auto;background:white;padding:30px;border-radius:20px;box-shadow:0 8px 30px #0002}
.card{background:#f7f8fa;padding:20px;border-radius:15px;margin:15px 0}
button{width:100%;padding:14px;margin:8px 0;border:0;border-radius:12px;background:#2563eb;color:white;font-size:16px;cursor:pointer}
button:hover{background:#1d4ed8}
.chat{background:#eef2f7;padding:15px;border-radius:15px}
.good{background:#dff5df;padding:15px;border-radius:12px;margin-top:15px}
.bad{background:#ffe2e2;padding:15px;border-radius:12px;margin-top:15px}
.progress{font-weight:bold;margin-bottom:20px}
.hidden{display:none}
</style>
</head>
<body>
<div class="container">
<h1>Симулятор «Авито: почему у конкурента больше звонков?»</h1>
<p>Вы — мастер по ремонту бытовой техники. Ваша задача — найти причину низкой эффективности объявления и правильно использовать рекламный бюджет.</p>

<div id="app"></div>
</div>

<script>
let score=0;
let step=0;

const screens=[
{
title:"Этап 1. Анализ кабинета",
text:`Ваше объявление:<br><b>«Ремонт бытовой техники быстро и недорого. Выезд мастера. Гарантия качества»</b><br><br>
Статистика:<br>
Показы: 1840<br>
Просмотры: 210<br>
Звонки: 1<br><br>
У конкурента:<br>
<b>«Ремонт стиральных машин на дому. Замена ТЭНа, подшипников. Выезд за 60 минут»</b><br><br>
Показы: 900<br>
Просмотры: 190<br>
Звонки: 17`,
answers:[
["Нужно увеличить бюджет продвижения","bad","Бюджет не исправит слабое попадание в запрос клиента. Вы получите больше неэффективных показов."],
["Моё объявление слишком общее, клиент ищет конкретную услугу","good","Верно. Клиент ищет решение проблемы, а не абстрактного хорошего мастера."],
["Нужно добавить больше эмоциональных слов","bad","Красивый текст не заменяет ключевые запросы пользователя."]
]
},
{
title:"Этап 2. Редактор объявления",
text:`Вы решили изменить заголовок. Какой вариант сильнее для поиска?`,
answers:[
["Ремонт стиральных машин на дому | замена ТЭНа, подшипников","good","Заголовок совпадает с реальными запросами пользователей."],
["Лучший мастер города. Быстро, качественно, недорого","bad","Такой заголовок звучит красиво, но плохо отвечает поисковому запросу."],
["Профессиональный ремонт любой техники с гарантией","bad","Слишком широкая формулировка."]
]
},
{
title:"Этап 3. Работа с продвижением",
text:`Через 3 дня после продвижения:<br>
Просмотры выросли ×5.<br>
Звонки выросли только на 10%.<br>
80% просмотров приходят ночью.<br><br>
Что изменить?`,
answers:[
["Оставить всё. Главное, что просмотры выросли","bad","Просмотры без обращений не окупают рекламу."],
["Перенести продвижение на периоды активности клиентов","good","Правильно. Нужно получать показы тогда, когда люди ищут мастера."],
["Увеличить бюджет в два раза","bad","Вы масштабируете проблему, а не решение."]
]
},
{
title:"Этап 4. Финальная оптимизация",
text:`После месяца работы:<br>
2000 просмотров → 25 звонков.<br><br>
Клиенты часто спрашивают: «А вы ремонтируете мою модель?»<br><br>
Что даст наибольший эффект?`,
answers:[
["Добавить фотографии процесса ремонта и конкретные виды работ","good","Клиент получает доказательство компетентности."],
["Купить максимальное продвижение","bad","Больше показов не решит проблему доверия."],
["Добавить много восклицательных знаков в текст","bad","Эмоциональная подача не заменяет полезность объявления."]
]
}
];

function render(){
let s=screens[step];
let html=`<div class="progress">Этап ${step+1} из ${screens.length}</div>
<div class="card"><h2>${s.title}</h2><p>${s.text}</p></div>
<div id="answers">`;
s.answers.forEach((a,i)=>{
html+=`<button onclick="choose(${i})">${a[0]}</button>`
});
html+="</div>";
document.getElementById("app").innerHTML=html;
}

function choose(i){
let a=screens[step].answers[i];
if(a[1]=="good")score+=25;
else score-=10;

let cls=a[1];
document.getElementById("app").innerHTML+=`<div class="${cls}">${a[2]}</div>
<button onclick="next()">Продолжить</button>`;
}

function next(){
step++;
if(step<screens.length)render();
else finish();
}

function finish(){
let text=score>=80?"Вы мыслите как маркетолог: анализируете спрос, а не просто покупаете показы.":
score>=40?"Вы понимаете основные принципы, но иногда заменяете стратегию увеличением бюджета.":
"Вы пока смотрите на рекламу как на покупку просмотров, а не как на систему получения клиентов.";

document.getElementById("app").innerHTML=`
<div class="card">
<h2>Результат</h2>
<p>Ваш результат: ${score} баллов</p>
<p>${text}</p>
</div>
<button onclick="location.reload()">Пройти ещё раз</button>`;
}

render();
</script>
</body>
</html>

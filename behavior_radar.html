<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Суета или залипание</title><style>
:root{--bg:#f4f7fb;--card:#fff;--text:#172238;--muted:#68758c;--blue:#3a67dc;--violet:#7458cf;--green:#2c8a62;--amber:#dc9534;--red:#c94f5c;--line:#dfe6f0;--shadow:0 16px 42px rgba(30,46,82,.10)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 8% 7%,rgba(58,103,220,.11),transparent 27%),radial-gradient(circle at 92% 8%,rgba(116,88,207,.10),transparent 24%),var(--bg)}
.app{max-width:1120px;margin:auto;padding:26px 16px 56px}.hero{background:linear-gradient(135deg,#213762,#4d3a78);color:#fff;border-radius:28px;padding:30px;box-shadow:var(--shadow)}
.eyebrow{text-transform:uppercase;letter-spacing:.14em;font-size:12px;font-weight:800;opacity:.75}h1{font-size:clamp(34px,6vw,56px);line-height:1.02;margin:10px 0 14px}.hero p{max-width:880px;font-size:18px;line-height:1.55;margin:0;opacity:.9}
.badges{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.badge{padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.12);font-size:13px}.panel{margin-top:20px;background:var(--card);border-radius:24px;padding:24px;box-shadow:var(--shadow)}
.case{padding:20px;border:1px solid var(--line);border-left:5px solid var(--blue);border-radius:18px;background:#fbfcfe;line-height:1.55}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.choice,.card{border:1px solid var(--line);background:#fff;padding:16px;border-radius:16px;text-align:left;cursor:pointer;font:inherit;color:var(--text);line-height:1.45;min-height:104px;transition:.18s}.choice:hover,.card:hover{transform:translateY(-2px);border-color:#aab7e8}.selected{border:2px solid var(--blue)!important;background:#f1f4ff!important}
.actions{display:flex;justify-content:space-between;gap:12px;margin-top:22px;flex-wrap:wrap}.btn{border:0;border-radius:14px;padding:13px 18px;font-weight:800;font-size:15px;cursor:pointer}.btn.primary{background:linear-gradient(90deg,var(--blue),var(--violet));color:#fff}.btn.secondary{background:#edf1f6;color:#26334d}.btn:disabled{opacity:.45}.hidden{display:none!important}
.feedback{display:none;margin-top:15px;padding:16px;border-radius:15px;line-height:1.5}.feedback.show{display:block}.good{background:#edf8f3;color:#155d41}.mid{background:#fff5e8;color:#815019}.bad{background:#fff0f2;color:#7d2a35}
.scorebox{background:linear-gradient(135deg,#22396b,#5e4689);color:#fff;border-radius:21px;padding:22px}.scorebox strong{display:block;font-size:54px;margin:8px 0}
.scale{display:flex;gap:7px;flex-wrap:wrap}.scale button{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:#fff;cursor:pointer}.scale button.selected{color:#fff;background:var(--blue)!important}
@media(max-width:820px){.grid,.grid3{grid-template-columns:1fr}.hero,.panel{padding:19px}}
</style></head><body><div class="app"><section class="hero"><div class="eyebrow">Поведенческий радар</div><h1>Суета или залипание?</h1><p>Распознайте две противоположные реакции на перегрузку и выберите действие, которое возвращает контроль.</p></section><section id="game" class="panel"><div id="cases" class="grid"></div><div class="actions"><button class="btn secondary" onclick="restart()">Начать заново</button><button id="finish" class="btn primary" disabled>Проверить радар</button></div></section><section id="result" class="panel hidden"></section></div><script>
const cases=[
{t:"Проверяете почту десятый раз за час",a:"rush"},
{t:"Перечитываете одну инструкцию и не начинаете",a:"freeze"},
{t:"Быстро говорите и перескакиваете между задачами",a:"rush"},
{t:"Бесцельно листаете ленту вместо ответа",a:"freeze"},
{t:"Крутите ручку и постоянно поправляете одежду",a:"rush"},
{t:"Смотрите в одну точку и откладываете простое действие",a:"freeze"}
];let c={};const box=document.getElementById("cases");
cases.forEach((x,i)=>{let d=document.createElement("div");d.className="card";d.style.cursor="default";d.innerHTML=`<strong>${x.t}</strong>`;[["rush","Суета"],["freeze","Залипание"]].forEach(o=>{let b=document.createElement("button");b.className="btn secondary";b.style.margin="8px 6px 0 0";b.textContent=o[1];b.onclick=()=>{c[i]=o[0];[...d.querySelectorAll("button")].forEach(q=>q.classList.remove("selected"));b.classList.add("selected");finish.disabled=Object.keys(c).length<cases.length};d.appendChild(b)});box.appendChild(d)});
finish.onclick=()=>{let s=0;cases.forEach((x,i)=>{if(c[i]===x.a)s++});let p=Math.round(s/cases.length*100);game.classList.add("hidden");result.classList.remove("hidden");result.innerHTML=`<div class="scorebox"><strong>${p}%</strong></div><p>${p>=84?"Вы точно различаете ускорение и замирание.":"Часть реакций пока воспринимается как обычная занятость или лень."}</p><p>Суету полезно замедлять, а залипание — разбивать на одно конечное действие.</p><button class="btn primary" onclick="restart()">Пройти еще раз</button>`};
function restart(){location.reload()}
</script></body></html>

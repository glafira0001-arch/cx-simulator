<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Decision</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
}


.widget{

width:520px;
max-width:calc(100vw - 20px);

margin:15px auto;

}



.instruction{

background:white;
border-radius:16px;

padding:12px 15px;

font-size:13px;

margin-bottom:10px;

box-shadow:0 3px 12px rgba(0,0,0,.05);

}



.block{

background:white;

border-radius:16px;

padding:12px;

margin-bottom:10px;

}



.block-title{

font-size:14px;

font-weight:bold;

margin-bottom:8px;

}



/* карточки задач */


.tasks{

display:grid;

grid-template-columns:1fr 1fr;

gap:7px;

}



.card{

background:#fff;

border:1px solid #ddd;

border-radius:10px;

padding:8px;

font-size:12px;

min-height:38px;

display:flex;

align-items:center;

cursor:grab;

}




/* зоны */


.zones{

display:grid;

grid-template-columns:1fr 1fr;

gap:8px;

}



.zone{

background:white;

border-radius:14px;

padding:10px;

min-height:85px;

}



.zone h4{

margin:0 0 4px;

font-size:14px;

}



.zone small{

font-size:11px;

color:#777;

}



.ai{

border:2px solid #4ade80;

}


.mix{

border:2px solid #facc15;

}



.human{

border:2px solid #fb7185;

width:250px;

margin:8px auto;

}




.zone .card{

font-size:11px;

padding:6px;

min-height:30px;

}




.answer{

display:none;

background:#111827;

color:white;

border-radius:14px;

padding:12px;

font-size:12px;

margin-top:10px;

}



.actions{

display:flex;

gap:8px;

margin-top:10px;

}



button{

border:none;

border-radius:12px;

padding:10px;

font-size:13px;

cursor:pointer;

}



.check{

flex:1;

background:#2563eb;

color:white;

}



.check:disabled{

background:#cbd5e1;

}



.reset{

background:#e5e7eb;

}




.result{

display:none;

background:white;

border-radius:14px;

padding:12px;

font-size:13px;

margin-top:10px;

}



</style>

</head>


<body>


<div class="widget">


<div class="instruction">

🎯 <b>Распределите функции между ИИ и человеком.</b><br>

Перетащите задачи в нужную зону. Решение можно менять до проверки.

</div>




<div class="block">

<div class="block-title">
📋 Задачи
</div>


<div class="tasks" id="pool">


<div class="card" draggable="true" data-type="ai">
📄 Типовой договор
</div>


<div class="card" draggable="true" data-type="human">
🤝 Сложный клиент
</div>


<div class="card" draggable="true" data-type="ai">
📊 Отчет
</div>


<div class="card" draggable="true" data-type="mix">
⚖️ Юр. спор
</div>


<div class="card" draggable="true" data-type="ai">
🎨 Дизайн
</div>


<div class="card" draggable="true" data-type="human">
🎯 Стратегия
</div>


</div>

</div>




<div class="zones">


<div class="zone ai" data-zone="ai">

<h4>🤖 ИИ</h4>

<small>Рутинные задачи</small>


</div>



<div class="zone mix" data-zone="mix">

<h4>🤝 Вместе</h4>

<small>ИИ + эксперт</small>


</div>



</div>




<div class="zone human" data-zone="human">

<h4>👤 Человек</h4>

<small>Стратегия и решения</small>

</div>





<div class="answer" id="answer"></div>



<div class="actions">


<button class="check" id="check" disabled>
✅ Проверить модель
</button>


<button class="reset" onclick="resetGame()">
↻
</button>


</div>




<div class="result" id="result"></div>



</div>






<script>


let dragged=null;



document.querySelectorAll(".card")
.forEach(card=>{


card.addEventListener("dragstart",()=>{

dragged=card;

});


});



document.querySelectorAll(".zone,#pool")
.forEach(area=>{


area.addEventListener("dragover",e=>{

e.preventDefault();

});



area.addEventListener("drop",()=>{


area.appendChild(dragged);


showAI(dragged);

checkReady();


});


});





function showAI(card){


let answer=document.getElementById("answer");


answer.style.display="block";


if(card.dataset.type==="ai"){

answer.innerHTML=
"🤖 ИИ: эту функцию можно передать автоматизации — она повторяемая и хорошо структурируется.";

}


if(card.dataset.type==="mix"){

answer.innerHTML=
"🤝 ИИ помогает подготовить решение, но эксперт принимает итоговое решение.";

}


if(card.dataset.type==="human"){

answer.innerHTML=
"👤 Человек нужен там, где важны стратегия, переговоры и ответственность.";

}


}





function checkReady(){


let count=document.querySelectorAll(".zone .card").length;


document.getElementById("check").disabled =
count!==6;


}





document.getElementById("check")
.onclick=function(){


let score=0;


document.querySelectorAll(".zone")
.forEach(zone=>{


zone.querySelectorAll(".card")
.forEach(card=>{


if(card.dataset.type===zone.dataset.zone){

score++;

}

});


});



let result=document.getElementById("result");


result.style.display="block";


result.innerHTML=

`
<b>📊 Результат:</b><br><br>

Правильно распределено:
<strong>${score}/6</strong> функций.

<br><br>

Главный вывод:
ИИ не заменяет людей —
он забирает рутинные функции.
`;

};






function resetGame(){


let pool=document.getElementById("pool");


document.querySelectorAll(".zone .card")
.forEach(card=>{

pool.appendChild(card);

});


document.getElementById("answer").style.display="none";


document.getElementById("result").style.display="none";


document.getElementById("check").disabled=true;


}



</script>


</body>
</html>

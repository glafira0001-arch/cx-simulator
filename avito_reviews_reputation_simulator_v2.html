<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Симулятор отзывов Авито</title>
<style>
body{font-family:Arial,sans-serif;background:#f2f3f5;padding:20px;color:#222}
.container{max-width:950px;margin:auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 8px 30px #0002}
.review{background:#fff;border:1px solid #ddd;border-radius:16px;padding:18px;margin:15px 0}
.profile{display:flex;gap:12px;align-items:center}
.avatar{width:48px;height:48px;border-radius:50%;background:#ddd}
.stars{color:#f59e0b}
.badge{font-size:13px;color:#777}
button{width:100%;padding:14px;margin:8px 0;border:0;border-radius:12px;background:#2563eb;color:white;cursor:pointer;font-size:15px}
button:hover{background:#1d4ed8}
.feedback{padding:16px;border-radius:12px;margin-top:15px}
.good{background:#dcfce7}.bad{background:#fee2e2}.mid{background:#fef3c7}
.result{background:#f5f5f5;padding:20px;border-radius:15px}
</style>
</head>
<body>
<div class="container">
<h1>Симулятор «Репутация мастера на Авито»</h1>
<p>Вы управляете профилем мастера. Ваш ответ видят не только автор отзыва, но и сотни будущих клиентов.</p>
<div id="app"></div>
</div>

<script>
const reviews=[
{
name:"Ирина",date:"2 дня назад",stars:"★★☆☆☆",
text:"Мастер приехал вовремя, работу сделал. Но через неделю снова появился шум. Пришлось писать самому, никто не интересовался результатом.",
answers:[
["Ответить, что гарантия есть и клиент должен был сразу обратиться, а не ждать неделю",-10,"Вы частично правы, но тон звучит как защита. Клиентам важна ответственность."],
["Поблагодарить за отзыв, уточнить ситуацию и предложить проверить технику по гарантии",20,"Вы показываете контроль ситуации и готовность отвечать за результат."],
["Написать, что такие случаи бывают у всех мастеров и это нормально",-5,"Вы обесцениваете проблему клиента."]
]},
{
name:"Александр",date:"5 дней назад",stars:"★★★☆☆",
text:"Цена оказалась выше, чем я ожидал. В целом мастер нормальный, но хотелось бы заранее понимать итоговую сумму.",
answers:[
["Объяснить, что стоимость была согласована после диагностики, и поблагодарить за замечание",20,"Вы спокойно объясняете процесс и показываете открытость."],
["Написать, что клиент сам виноват, потому что не спросил цену",-15,"Даже если факт на вашей стороне, публичное обвинение ухудшает впечатление."],
["Предложить всем будущим клиентам скидку за неудобства",-5,"Вы создаете ощущение, что цена могла быть завышена."]
]},
{
name:"Олег",date:"неделю назад",stars:"★☆☆☆☆",
text:"Не рекомендую. Дорого берет. Можно найти дешевле.",
answers:[
["Ответить: «Спасибо за мнение. На стоимость влияют детали, гарантия и качество работы»",15,"Вы объясняете ценность без конфликта."],
["Написать длинный список причин, почему другие мастера хуже",-5,"Попытка доказать превосходство часто выглядит неуверенно."],
["Удалить отзыв и не реагировать",-5,"Отсутствие ответа оставляет негатив без вашего комментария."]
]},
{
name:"Мария",date:"10 дней назад",stars:"★★★☆☆",
text:"Мастер хороший, но приехал позже обещанного времени.",
answers:[
["Извиниться за задержку и объяснить, что будете точнее рассчитывать время",20,"Вы признаете неудобство и показываете улучшение."],
["Объяснить, что ремонт иногда задерживается и клиент должен это понимать",-5,"Вы объясняете причину, но не признаете неудобство."],
["Не отвечать, потому что отзыв в целом положительный",-5,"Даже небольшая претензия — возможность показать сервис."]
]},
{
name:"Сергей",date:"сегодня",stars:"★☆☆☆☆",
text:"Этот мастер мошенник! Берет деньги и ничего не делает!",
answers:[
["Эмоционально написать: «Вы врете, я вас засужу»",-15,"Агрессивный ответ усиливает подозрения."],
["Спокойно попросить обратиться в поддержку и указать, что заказ не найден",20,"Вы защищаете репутацию через факты."],
["Попытаться вспомнить клиента и публично выяснять детали ремонта",-5,"Публичный спор может раскрыть лишние детали."]
]},
{
name:"Наталья",date:"12 дней назад",stars:"★★☆☆☆",
text:"После ремонта стало лучше, но мастер не оставил никаких документов.",
answers:[
["Поблагодарить за обратную связь и уточнить, что гарантийный талон можно оформить",20,"Вы превращаете замечание в демонстрацию сервиса."],
["Ответить, что документы не обязательны для частного мастера",-10,"Клиент слышит оправдание."],
["Сказать, что все остальные клиенты довольны",-5,"Отзывы других людей не решают проблему конкретного клиента."]
]},
{
name:"Дмитрий",date:"месяц назад",stars:"★★★★☆",
text:"Все хорошо, но хотелось бы быстрее отвечать в чате.",
answers:[
["Поблагодарить и отметить, что будете улучшать скорость ответа",15,"Вы используете даже небольшую критику для усиления доверия."],
["Ответить, что у хорошего мастера много работы",-5,"Фраза может звучать как оправдание."],
["Игнорировать, потому что оценка высокая",-5,"Вы упускаете возможность показать внимание."]
]}
];

let index=0, score=50;

function render(){
let r=reviews[index];
document.getElementById("app").innerHTML=`
<div class="review">
<div class="profile"><div class="avatar"></div><div><b>${r.name}</b><br><span class="stars">${r.stars}</span> <span class="badge">${r.date}</span></div></div>
<p>${r.text}</p>
</div>
<h3>Ваш публичный ответ:</h3>
<div id="buttons"></div>`;
r.answers.forEach((a,i)=>{
let b=document.createElement("button");
b.innerText=a[0];
b.onclick=()=>choose(i);
document.getElementById("buttons").appendChild(b);
});
}

function choose(i){
let a=reviews[index].answers[i];
score+=a[1];
document.getElementById("app").innerHTML+=`<div class="feedback ${a[1]>5?'good':a[1]<0?'bad':'mid'}">${a[2]}</div><button onclick="next()">Перейти к следующему отзыву</button>`;
}

function next(){
index++;
if(index<reviews.length)render();
else finish();
}

function finish(){
let text=score>130?"Эксперт по репутации. Вы умеете превращать даже негатив в доказательство профессионализма.":
score>90?"Хороший уровень. Вы понимаете принципы работы с отзывами, но некоторые ответы можно сделать сильнее.":
"Есть риск усиливать негатив своими ответами. Нужно больше внимания уделять публичной коммуникации.";

document.getElementById("app").innerHTML=`<div class="result"><h2>Итог</h2><p>Репутационный рейтинг: ${score}</p><p>${text}</p><button onclick="location.reload()">Пройти ещё раз</button></div>`;
}
render();
</script>
</body>
</html>

<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><title>Сигналы уверенности</title>
<style>body{font-family:Arial;background:#f6f6f2;padding:30px}.box{max-width:800px;margin:auto;background:#fff;padding:30px;border-radius:20px}label{display:block;padding:10px}</style></head>
<body><div class="box"><h2>Найдите слабые сигналы отказа</h2>
<p>Человек говорит: «Я понимаю, что задача важная... но, наверное, я не успею... хотя, если очень нужно, я могу попробовать».</p>
<p>Какие сигналы делают отказ неуверенным?</p>
<label><input type="checkbox"> Быстрый темп речи</label>
<label><input type="checkbox"> Спокойная пауза после отказа</label>
<label><input type="checkbox"> Взгляд в сторону</label>
<label><input type="checkbox"> Лишние оправдания</label>
<label><input type="checkbox"> Открытая поза</label>
<button onclick="alert('Верно: быстрый темп речи, взгляд в сторону и лишние оправдания создают ощущение неуверенности.')">Проверить</button>
</div></body></html>

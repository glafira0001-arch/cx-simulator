<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Искусство компромисса</title>
<style>body{font-family:Arial;background:#f6f6f2;padding:30px}.box{max-width:900px;margin:auto;background:#fff;padding:30px;border-radius:20px} .card{padding:15px;background:#f1f4f7;border-radius:12px;margin:10px;cursor:pointer} .col{display:inline-block;width:45%;vertical-align:top;margin:2%}.drop{min-height:180px;background:#fafafa;border:2px dashed #bbb;padding:10px}</style></head>
<body><div class="box">
<h2>Компромисс или скрытая уступка?</h2>
<p>Перетащите ситуации в правильную колонку.</p>
<div class="col"><h3>✅ Экологичный компромисс</h3><div id="good" class="drop"></div></div>
<div class="col"><h3>❌ Замаскированное «да»</h3><div id="bad" class="drop"></div></div>
<div id="cards"></div>
<script>
let data=["Я могу проверить ключевые цифры завтра утром, но не весь отчет сегодня","Я сделаю ночью, чтобы никого не подвести","Я не смогу прийти на встречу, но отвечу письменно","Хорошо, возьму еще одну задачу, хотя уже перегружен","Могу подключиться на 15 минут и помочь разобраться","Сделаю сейчас, хотя это сдвинет мои приоритеты"];
let c=document.getElementById("cards");
data.forEach(x=>{let d=document.createElement("div");d.className="card";d.draggable=true;d.textContent=x;d.ondragstart=e=>e.dataTransfer.setData("t",x);c.appendChild(d)});
document.querySelectorAll(".drop").forEach(d=>d.ondragover=e=>e.preventDefault());
document.querySelectorAll(".drop").forEach(d=>d.ondrop=e=>{let x=e.dataTransfer.getData("t");d.innerHTML+=`<p>${x}</p>`});
</script></div></body></html>
